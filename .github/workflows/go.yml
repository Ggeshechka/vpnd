name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26'
        cache: true

    - name: Build Linux
      run: GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w -buildid=" -v -o goapp .

    - name: Build Windows
      run: GOOS=windows GOARCH=amd64 go build -trimpath -ldflags="-s -w -buildid=" -v -o goapp.exe .

    - name: Upload Linux Artifact
      uses: actions/upload-artifact@v7
      with:
        name: linux-build
        path: vpnd

    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v7
      with:
        name: windows-build
        path: vpnd.exe
